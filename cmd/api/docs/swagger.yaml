  handlers.shotResponse:
    properties:
      club:
        type: string
      hole_id:
        type: integer
      id:
        type: integer
      miss:
        type: string
      result:
        type: string
      shot_number:
        type: integer
      shot_type:
        type: string
      source:
        type: string
      strike_quality:
        type: string
    type: object
  handlers.teeHoleResponse:
    properties:
      course_hole_id:
        type: integer
      distance:
        type: integer
      id:
        type: integer
      par:
        type: integer
      stroke_index:
        type: integer
      tee_centre_lat:
        type: number
      tee_centre_lng:
        type: number
      tee_id:
        type: integer
    type: object
  handlers.teeResponse:
    properties:
      course_id:
        type: integer
