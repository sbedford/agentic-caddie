host: localhost:3000
info:
  contact: {}
  description: Golf caddie backend — players, rounds, shots and course data.
  title: Agentic Caddie API
  version: "1.0"
paths:
  /clubs:
    post:
      consumes:
      - application/json
      parameters:
      - description: Club to create
        in: body
        name: club
        required: true
        schema:
          $ref: '#/definitions/handlers.createClubRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.clubResponse'
        "400":
          description: Invalid request body
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Add a club to a player's bag
      tags:
      - clubs
  /clubs/{id}:
    delete:
      parameters:
      - description: Club ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Delete a club record
      tags:
      - clubs
    get:
      parameters:
      - description: Club ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.clubResponse'
        "400":
          description: Invalid ID
          schema:
            type: string
        "404":
          description: Club not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get a club by ID
      tags:
      - clubs
  /clubs/{id}/distances:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Club ID
        in: path
        name: id
        required: true
        type: integer
      - description: Distance model
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateClubDistancesRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Update distance model for a club
      tags:
      - clubs
  /clubs/player/{playerId}:
    get:
      parameters:
      - description: Player ID
        in: path
        name: playerId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.clubResponse'
            type: array
        "400":
          description: Invalid player ID
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: List all clubs for a player
      tags:
      - clubs
  /clubs/player/{playerId}/active:
    get:
      parameters:
      - description: Player ID
        in: path
        name: playerId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.clubResponse'
            type: array
        "400":
          description: Invalid player ID
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: List active (in-bag) clubs for a player
      tags:
      - clubs
  /clubs/player/{playerId}/name/{clubName}:
    get:
      parameters:
      - description: Player ID
        in: path
        name: playerId
        required: true
        type: integer
      - description: Club name
        in: path
        name: clubName
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.clubResponse'
        "400":
          description: Invalid player ID
          schema:
            type: string
        "404":
          description: Club not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get the active club for a player by club name
      tags:
      - clubs
  /clubs/player/{playerId}/name/{clubName}/date/{date}:
    get:
      parameters:
      - description: Player ID
        in: path
        name: playerId
        required: true
        type: integer
      - description: Club name
        in: path
        name: clubName
        required: true
        type: string
      - description: Date (YYYY-MM-DD)
        in: path
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.clubResponse'
        "400":
          description: Invalid parameters
          schema:
            type: string
        "404":
          description: Club not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get a club as it existed on a specific date
      tags:
      - clubs
  /clubs/player/{playerId}/name/{clubName}/retire:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Player ID
        in: path
        name: playerId
        required: true
        type: integer
      - description: Club name
        in: path
        name: clubName
        required: true
        type: string
      - description: Removal date
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.retireClubRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Retire a club (remove from bag)
      tags:
      - clubs
  /commentary:
    post:
      consumes:
      - application/json
      parameters:
      - description: Commentary to store
        in: body
        name: commentary
        required: true
        schema:
          $ref: '#/definitions/handlers.createCommentaryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.commentaryResponse'
        "400":
          description: Invalid request body
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Store a commentary entry
      tags:
      - commentary
  /commentary/{id}:
    delete:
      parameters:
      - description: Commentary ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Delete a commentary entry by ID
      tags:
      - commentary
    get:
      parameters:
      - description: Commentary ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.commentaryResponse'
        "400":
          description: Invalid ID
          schema:
            type: string
        "404":
          description: Commentary not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get a commentary entry by ID
      tags:
      - commentary
  /commentary/scope/{scope}/{scopeId}:
    delete:
      parameters:
      - description: Scope (hole or round)
        in: path
        name: scope
        required: true
        type: string
      - description: Scope ID
        in: path
        name: scopeId
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid scope ID
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Delete all commentary for a hole or round
      tags:
      - commentary
    get:
      parameters:
      - description: Scope (hole or round)
        in: path
        name: scope
        required: true
        type: string
      - description: Scope ID
        in: path
        name: scopeId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.commentaryResponse'
            type: array
        "400":
          description: Invalid scope ID
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: List commentary entries for a hole or round
      tags:
      - commentary
  /commentary/scope/{scope}/{scopeId}/latest:
    get:
      parameters:
      - description: Scope (hole or round)
        in: path
        name: scope
        required: true
        type: string
      - description: Scope ID
        in: path
        name: scopeId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.commentaryResponse'
        "400":
          description: Invalid scope ID
          schema:
            type: string
        "404":
          description: No commentary found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get the most recent commentary for a hole or round
      tags:
      - commentary
  /course-holes:
    post:
      consumes:
      - application/json
      parameters:
      - description: Hole to create
        in: body
        name: hole
        required: true
        schema:
          $ref: '#/definitions/handlers.createCourseHoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.courseHoleResponse'
        "400":
          description: Invalid request body
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Create a course hole
      tags:
      - course-holes
  /course-holes/{id}:
    delete:
      parameters:
      - description: Course Hole ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Delete a course hole
      tags:
      - course-holes
    get:
      parameters:
      - description: Course Hole ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.courseHoleResponse'
        "400":
          description: Invalid ID
          schema:
            type: string
        "404":
          description: Course hole not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get a course hole by ID
      tags:
      - course-holes
  /course-holes/{id}/coordinates:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Course Hole ID
        in: path
        name: id
        required: true
        type: integer
      - description: Coordinates
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.updateCourseHoleCoordinatesRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Update green coordinates for a course hole
      tags:
      - course-holes
  /course-holes/course/{courseId}:
    get:
      parameters:
      - description: Course ID
        in: path
        name: courseId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.courseHoleResponse'
            type: array
        "400":
          description: Invalid course ID
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: List holes for a course
      tags:
      - course-holes
  /course-holes/course/{courseId}/number/{holeNumber}:
    get:
      parameters:
      - description: Course ID
        in: path
        name: courseId
        required: true
        type: integer
      - description: Hole number
        in: path
        name: holeNumber
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.courseHoleResponse'
        "400":
          description: Invalid parameters
          schema:
            type: string
        "404":
          description: Course hole not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get a course hole by course and hole number
      tags:
      - course-holes
  /courses:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
