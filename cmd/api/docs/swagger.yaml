basePath: /
definitions:
  handlers.clubResponse:
    properties:
      added_date:
        type: string
      calculated_at:
        type: string
      carry_avg:
        type: number
      carry_max:
        type: number
      carry_reliable:
        type: number
      club_name:
        type: string
      dispersion_avg_m:
        type: number
      dispersion_bias:
        type: string
      id:
        type: integer
      player_id:
        type: integer
      removed_date:
        type: string
      sample_size:
        type: integer
    type: object
  handlers.commentaryResponse:
    properties:
      content:
        type: string
      generated_at:
        type: string
      id:
        type: integer
      scope:
        type: string
      scope_id:
        type: integer
    type: object
  handlers.courseHoleResponse:
    properties:
      course_id:
        type: integer
      green_centre_lat:
        type: number
      green_centre_lng:
        type: number
      hole_number:
        type: integer
      id:
        type: integer
    type: object
  handlers.courseResponse:
    properties:
      created_at:
        type: string
      golf_api_id:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  handlers.createClubRequest:
    properties:
      added_date:
        example: "2024-01-01"
        type: string
      carry_avg:
        example: 155
        type: number
      carry_max:
        example: 165
        type: number
      carry_reliable:
        example: 148
        type: number
      club_name:
        example: 7i
        type: string
      dispersion_avg_m:
        example: 8.5
        type: number
      dispersion_bias:
        example: straight
        type: string
      player_id:
        example: 1
        type: integer
      sample_size:
        example: 0
        type: integer
    type: object
  handlers.createCommentaryRequest:
    properties:
      content:
        example: A strong par on a tricky hole.
        type: string
      scope:
        example: hole
        type: string
      scope_id:
        example: 1
        type: integer
    type: object
  handlers.createCourseHoleRequest:
    properties:
      course_id:
        example: 1
        type: integer
      green_centre_lat:
        example: -33.8688
        type: number
      green_centre_lng:
        example: 151.2093
        type: number
      hole_number:
        example: 1
        type: integer
    type: object
  handlers.createCourseRequest:
    properties:
      golf_api_id:
        example: abc123
        type: string
      name:
        example: Augusta National
        type: string
    type: object
  handlers.createHoleRequest:
    properties:
      course_hole_id:
        example: 1
        type: integer
      flag_position:
        example: middle_centre
        type: string
      gir:
        example: true
        type: boolean
      hole_number:
        example: 1
        type: integer
      penalty:
        example: false
        type: boolean
      points:
        example: 2
        type: integer
      putts:
        example: 2
        type: integer
      round_id:
        example: 1
        type: integer
      score:
        example: 4
        type: integer
      scramble_save:
        example: false
        type: boolean
    type: object
  handlers.createPOIRequest:
    properties:
      course_hole_id:
        example: 1
        type: integer
      distance_end:
        example: 200
        type: number
      distance_start:
        example: 180
        type: number
      label:
        example: Fairway bunker left
        type: string
      poi_type:
        example: bunker
        type: string
      reference_point:
        example: tee
        type: string
      side:
        example: left
        type: string
      specific_tee:
        example: white
        type: string
    type: object
  handlers.createPlayerRequest:
    properties:
      handicap:
        example: 12.5
        type: number
      name:
        example: Alice
        type: string
    type: object
  handlers.createRoundRequest:
    properties:
      course_id:
        example: 1
        type: integer
      played_at:
        example: "2024-06-01"
        type: string
      player_id:
        example: 1
        type: integer
      round_type:
        example: social
        type: string
      tees:
        example: white
        type: string
    type: object
  handlers.createShotRequest:
    properties:
      club:
        example: driver
        type: string
      hole_id:
        example: 1
        type: integer
      miss:
        type: string
      result:
        example: fairway
        type: string
      shot_number:
        example: 1
        type: integer
      shot_type:
        example: tee
        type: string
      source:
        example: manual
        type: string
      strike_quality:
        example: clean
        type: string
    type: object
  handlers.createTeeHoleRequest:
    properties:
      course_hole_id:
        example: 1
        type: integer
      distance:
        example: 385
        type: integer
      par:
        example: 4
        type: integer
      stroke_index:
        example: 7
        type: integer
      tee_centre_lat:
        example: -33.8688
        type: number
      tee_centre_lng:
        example: 151.2093
        type: number
      tee_id:
        example: 1
        type: integer
    type: object
  handlers.createTeeRequest:
    properties:
      course_id:
        example: 1
        type: integer
      course_rating:
        example: 69.5
        type: number
      name:
        example: white
        type: string
      slope_rating:
        example: 113
        type: integer
    type: object
  handlers.holeResponse:
    properties:
      course_hole_id:
        type: integer
      flag_position:
        type: string
      gir:
        type: boolean
      hole_number:
        type: integer
      id:
        type: integer
      penalty:
        type: boolean
      points:
        type: integer
      putts:
        type: integer
      round_id:
        type: integer
      score:
        type: integer
      scramble_save:
        type: boolean
    type: object
  handlers.playerResponse:
    properties:
      handicap:
        type: number
      id:
        type: integer
      name:
        type: string
    type: object
  handlers.poiResponse:
    properties:
      course_hole_id:
        type: integer
      distance_end:
        type: number
      distance_start:
        type: number
      id:
        type: integer
      label:
        type: string
      poi_type:
        type: string
      reference_point:
        type: string
      side:
        type: string
      specific_tee:
        type: string
    type: object
  handlers.retireClubRequest:
    properties:
      removed_date:
        example: "2024-06-01"
